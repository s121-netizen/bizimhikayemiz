<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Beni Affeder Misin? 💜</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Comic Sans MS", sans-serif;
}

/* ✅ MOBİL SCROLL FIX */
html, body{
    height:100%;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eadcff,#f5f5f5);
    overflow-y:auto; /* FIX: scroll artık var */
}

/* CONTAINER */
.container{
    text-align:center;
    padding:20px;
    width:100%;
    max-width:500px;
}

.hello-kitty{
    width:220px;
    max-width:70vw;
    margin-bottom:15px;
}

h1{
    color:#9b7ede;
    font-size:1.8rem;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:20px;
    line-height:1.5;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

/* ✅ MOBİL TAP MAVİ ENGEL */
button{
    border:none;
    cursor:pointer;
    padding:14px 28px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
    user-select:none;
    -webkit-tap-highlight-color: transparent;
    outline:none;
}

#yesBtn{
    background:#b794ff;
    color:white;
}

#noBtn{
    background:#e5e5e5;
    color:#555;
}

.message{
    margin-top:15px;
    min-height:25px;
    font-size:18px;
    color:#8b5cf6;
    font-weight:bold;
}

/* FINAL SCREEN */
.final{
    height:100vh;
    width:100vw;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#eadcff,#f5f5f5);
}

/* HEART */
.heart{
    position:fixed;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="container">

    <!-- HELLO KITTY -->
    <img class="hello-kitty"
         src="hellokitty.png"
         alt="Hello Kitty">

    <h1>Beni Affeder Misin? 💜</h1>

    <p>
        Sana karşı hata yaptım...<br>
        Seni üzmek istemedim 🥺
    </p>

    <div class="buttons">
        <button id="yesBtn">Evet 💜</button>
        <button id="noBtn">Hayır 🙈</button>
    </div>

    <div class="message" id="message"></div>

</div>

<script>

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

let count = 0;

const texts = [
    "Emin misin? 🥺",
    "Bir daha düşün 💜",
    "Lütfen... 😔",
    "Seni çok seviyorum 🥹",
    "Bak evet daha mantıklı 😭",
    "Kaçamazsın 😈",
    "Son kararın mı?"
];

noBtn.addEventListener("click", () => {

    count++;

    message.textContent = texts[Math.min(count-1, texts.length-1)];

    let scale = 1 + count * 0.45;
    yesBtn.style.transform = `scale(${scale})`;

    if(count >= 7){

        yesBtn.style.position = "fixed";
        yesBtn.style.top = "0";
        yesBtn.style.left = "0";
        yesBtn.style.width = "100vw";
        yesBtn.style.height = "100vh";
        yesBtn.style.borderRadius = "0";
        yesBtn.style.transform = "none";
        yesBtn.style.fontSize = "60px";
        yesBtn.style.zIndex = "9999";

        noBtn.style.display = "none";
        message.style.display = "none";
    }
});

yesBtn.addEventListener("click", () => {

    startHearts();

    document.body.innerHTML = `
    <div class="final">
        <img src="hellokitty.png"
        style="width:220px;max-width:70vw;">

        <h1>Teşekkür Ederim 💜</h1>
        <p>Seni çok seviyorum 🥺🎀</p>
    </div>
    `;
});

function startHearts(){

    setInterval(() => {

        const heart = document.createElement("div");
        heart.innerHTML = "💜"; /* FIX: gri yerine çalışan emoji */
        heart.className = "heart";

        heart.style.left = Math.random()*100 + "vw";
        heart.style.fontSize = (20 + Math.random()*20) + "px";
        heart.style.animationDuration = (3 + Math.random()*3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 7000);

    }, 200);
}

</script>

</body>
</html>
